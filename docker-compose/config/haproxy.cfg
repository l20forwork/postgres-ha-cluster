global
  maxconn 5000
  log stdout format raw local0
  tune.ssl.default-dh-param 2048
  tune.bufsize 32768
  tune.maxrewrite 8192

defaults
  mode tcp
  timeout connect 3s
  timeout client 30m
  timeout server 30m
  timeout check 5s
  option log-health-checks
  option redispatch
  retries 3

# ---------------------------------------------------------------------------
# RW traffic – clients connect here for reads *and* writes
# ---------------------------------------------------------------------------
listen postgres_rw
  bind *:5432
  option pgsql-check user haproxy_check
  balance roundrobin
  option httpchk GET /primary
  http-check expect status 200
  default-server inter 5s fall 5 rise 3 on-marked-down shutdown-sessions
  server pg1 pgb1:5432 check addr pg1 port 8008
  server pg2 pgb2:5432 check addr pg2 port 8008
  server pg3 pgb3:5432 check addr pg3 port 8008

# ---------------------------------------------------------------------------
# RO traffic – read‑only queries routed to standbys
# ---------------------------------------------------------------------------
listen postgres_ro
  bind *:5433
  option pgsql-check user haproxy_check
  balance roundrobin
  option httpchk GET /read-only
  http-check expect status 200
  default-server inter 5s fall 5 rise 3 on-marked-down shutdown-sessions
  server pg1 pgb1:5432 check addr pg1 port 8008
  server pg2 pgb2:5432 check addr pg2 port 8008
  server pg3 pgb3:5432 check addr pg3 port 8008

# ---------------------------------------------------------------------------
# Stats UI (with basic auth for security)
# ---------------------------------------------------------------------------
listen stats
  bind *:7001
  mode http
  stats enable
  stats uri /
  stats refresh 10s
  stats auth admin:admin
  stats admin if TRUE
